name: Make Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. v3.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew jar

      - name: Collect JAR
        run: |
          mkdir release
          find . -name "*.jar" -path "*/build/libs/*" ! -name "*-raw.jar" ! -name "*-sources.jar" -exec cp {} release/ \;

      - name: Create Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ inputs.version }}
          git push origin ${{ inputs.version }}

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          generate_release_notes: true
          files: release/*.jar
